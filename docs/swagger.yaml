basePath: /
definitions:
  github_com_mtlprog_stat_internal_indicator.Indicator:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      unit:
        type: string
      value:
        type: number
    type: object
  github_com_mtlprog_stat_internal_snapshot.Snapshot:
    properties:
      createdAt:
        type: string
      data:
        items:
          type: integer
        type: array
      entityId:
        type: integer
      id:
        type: integer
      snapshotDate:
        type: string
    type: object
  internal_api.BalanceBySubfundResponse:
    properties:
      date:
        description: YYYY-MM-DD
        type: string
      slices:
        items:
          $ref: '#/definitions/internal_api.SubfundSlice'
        type: array
    type: object
  internal_api.HistoryPoint:
    properties:
      date:
        description: YYYY-MM-DD
        type: string
      value:
        type: number
    type: object
  internal_api.IndicatorHistoryResponse:
    properties:
      series:
        items:
          $ref: '#/definitions/internal_api.IndicatorSeries'
        type: array
    type: object
  internal_api.IndicatorSeries:
    properties:
      id:
        type: integer
      name:
        type: string
      points:
        items:
          $ref: '#/definitions/internal_api.HistoryPoint'
        type: array
      unit:
        type: string
    type: object
  internal_api.IndicatorWithChanges:
    properties:
      changes:
        additionalProperties:
          $ref: '#/definitions/internal_api.PeriodChange'
        type: object
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      unit:
        type: string
      value:
        type: number
    type: object
  internal_api.PeriodChange:
    properties:
      abs:
        type: number
      pct:
        type: number
    type: object
  internal_api.SubfundSlice:
    properties:
      address:
        type: string
      name:
        type: string
      type:
        type: string
      value:
        type: number
    type: object
info:
  contact: {}
  description: |-
    Read-only API exposing fund snapshots, computed indicators, and chart data.
    All numeric fields encoded as JSON strings to preserve full Stellar-stroop precision.
  title: MTL Fund Statistics API
  version: "1.0"
paths:
  /api/v1/charts/balance-by-subfund:
    get:
      description: Returns the EURMTL value of the 4 sub-fund accounts (MABIZ, MCITY,
        DEFI, BOSS) for a given date.
      parameters:
      - description: Snapshot date (YYYY-MM-DD); defaults to latest
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.BalanceBySubfundResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fund balance split by sub-fund
      tags:
      - charts
  /api/v1/charts/indicator-history:
    get:
      description: Returns historical points for one or more indicator IDs over the
        requested range.
      parameters:
      - description: Comma-separated indicator IDs (e.g. 1,3,17,24,27)
        in: query
        name: ids
        required: true
        type: string
      - description: 'Range: 30d, 90d, 180d, 365d, or ''all'' (default: 90d)'
        in: query
        name: range
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.IndicatorHistoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Indicator time-series
      tags:
      - charts
  /api/v1/indicators:
    get:
      description: Returns indicators from the most recent stored snapshot. Optional
        `compare` adds period-over-period changes.
      parameters:
      - description: 'Comma-separated periods: any of 30d,90d,180d,365d, or ''all'''
        in: query
        name: compare
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.IndicatorWithChanges'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Latest indicators
      tags:
      - indicators
  /api/v1/indicators/{date}:
    get:
      description: Returns stored indicators for an exact snapshot date.
      parameters:
      - description: Snapshot date (YYYY-MM-DD)
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_mtlprog_stat_internal_indicator.Indicator'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Indicators by date
      tags:
      - indicators
  /api/v1/snapshots:
    get:
      description: Returns recent fund snapshots, newest first.
      parameters:
      - description: Maximum number of snapshots (default 30, max 365)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_mtlprog_stat_internal_snapshot.Snapshot'
            type: array
      summary: List snapshots
      tags:
      - snapshots
  /api/v1/snapshots/{date}:
    get:
      description: Returns the fund snapshot for an exact date.
      parameters:
      - description: Snapshot date (YYYY-MM-DD)
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_mtlprog_stat_internal_snapshot.Snapshot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Snapshot by date
      tags:
      - snapshots
  /api/v1/snapshots/latest:
    get:
      description: Returns the most recent fund snapshot.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_mtlprog_stat_internal_snapshot.Snapshot'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Latest snapshot
      tags:
      - snapshots
schemes:
- http
- https
swagger: "2.0"
